<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'DM Sans',sans-serif;background:#0a0a0a;color:#f0f0f0;overflow-x:hidden}
::-webkit-scrollbar{width:6px}
::-webkit-scrollbar-track{background:#111}
::-webkit-scrollbar-thumb{background:#333;border-radius:3px}
::-webkit-scrollbar-thumb:hover{background:#555}
.sidebar{width:260px;min-height:100vh;background:#111;border-right:1px solid #262626;position:fixed;left:0;top:0;z-index:40;transition:transform .3s cubic-bezier(.4,0,.2,1)}
.sidebar.closed{transform:translateX(-100%)}
.main-area{margin-left:260px;min-height:100vh;transition:margin .3s cubic-bezier(.4,0,.2,1)}
.main-area.full{margin-left:0}
.nav-item{display:flex;align-items:center;gap:12px;padding:10px 20px;margin:2px 12px;border-radius:10px;cursor:pointer;transition:all .2s;color:#737373;font-size:14px;font-weight:500}
.nav-item:hover{background:#1a1a1a;color:#f0f0f0}
.nav-item.active{background:rgba(245,158,11,.1);color:#f59e0b}

.stat-card{background:#171717;border:1px solid #262626;border-radius:16px;padding:24px;transition:all .3s;position:relative;overflow:hidden}
.stat-card::before{content:'';position:absolute;top:0;left:0;right:0;height:2px;background:linear-gradient(90deg,transparent,var(--card-accent,#f59e0b),transparent);opacity:0;transition:opacity .3s}
.stat-card:hover{border-color:#333;transform:translateY(-2px)}.stat-card:hover::before{opacity:1}
.input-field{background:#0f0f0f;border:1px solid #262626;border-radius:10px;padding:10px 14px;color:#f0f0f0;font-size:14px;width:100%;transition:border .2s;font-family:'DM Sans',sans-serif}
.input-field:focus{outline:none;border-color:#f59e0b}
.input-field::placeholder{color:#525252}
.btn{padding:10px 20px;border-radius:10px;font-weight:600;font-size:14px;cursor:pointer;transition:all .2s;border:none;font-family:'DM Sans',sans-serif;display:inline-flex;align-items:center;gap:8px}
.btn-primary{background:#f59e0b;color:#0a0a0a}.btn-primary:hover{background:#fbbf24;transform:translateY(-1px)}
.btn-danger{background:#ef4444;color:#fff}.btn-danger:hover{background:#dc2626}
.btn-ghost{background:transparent;border:1px solid #262626;color:#f0f0f0}.btn-ghost:hover{border-color:#444;background:#1a1a1a}
.btn-success{background:#10b981;color:#fff}.btn-success:hover{background:#059669}
.btn-sm{padding:6px 12px;font-size:12px;border-radius:8px}
.table-row{border-bottom:1px solid #1a1a1a;transition:background .15s}.table-row:hover{background:#1a1a1a}
.badge{display:inline-flex;align-items:center;padding:3px 10px;border-radius:20px;font-size:11px;font-weight:600}
.badge-success{background:rgba(16,185,129,.12);color:#10b981}
.badge-danger{background:rgba(239,68,68,.12);color:#ef4444}
.badge-warn{background:rgba(234,179,8,.12);color:#eab308}
.badge-accent{background:rgba(245,158,11,.12);color:#f59e0b}
.overlay{position:fixed;inset:0;background:rgba(0,0,0,.6);z-index:35;opacity:0;pointer-events:none;transition:opacity .3s}
.overlay.show{opacity:1;pointer-events:all}
.modal-backdrop{position:fixed;inset:0;background:rgba(0,0,0,.7);z-index:50;display:flex;align-items:center;justify-content:center;opacity:0;pointer-events:none;transition:opacity .25s;padding:16px}
.modal-backdrop.show{opacity:1;pointer-events:all}
.modal-box{background:#171717;border:1px solid #262626;border-radius:16px;padding:28px;max-width:500px;width:100%;transform:scale(.95);transition:transform .25s;max-height:85vh;overflow-y:auto}
.modal-backdrop.show .modal-box{transform:scale(1)}
.toast-container{position:fixed;top:20px;right:20px;z-index:60;display:flex;flex-direction:column;gap:8px}
.toast{padding:12px 20px;border-radius:10px;font-size:13px;font-weight:500;display:flex;align-items:center;gap:10px;animation:slideIn .3s ease;min-width:260px;box-shadow:0 8px 24px rgba(0,0,0,.4)}
.toast-success{background:#065f46;border:1px solid #10b981;color:#a7f3d0}
.toast-error{background:#7f1d1d;border:1px solid #ef4444;color:#fca5a5}
.toast-info{background:#1e3a5f;border:1px solid #3b82f6;color:#93c5fd}
.toast-warn{background:#713f12;border:1px solid #eab308;color:#fde68a}
@keyframes slideIn{from{transform:translateX(100%);opacity:0}to{transform:translateX(0);opacity:1}}
@keyframes slideOut{from{transform:translateX(0);opacity:1}to{transform:translateX(100%);opacity:0}}
@keyframes fadeUp{from{opacity:0;transform:translateY(16px)}to{opacity:1;transform:translateY(0)}}
.fade-up{animation:fadeUp .4s ease both}
.fade-up-1{animation-delay:.05s}.fade-up-2{animation-delay:.1s}.fade-up-3{animation-delay:.15s}.fade-up-4{animation-delay:.2s}.fade-up-5{animation-delay:.25s}
@keyframes pulse-glow{0%,100%{box-shadow:0 0 0 0 rgba(245,158,11,.2)}50%{box-shadow:0 0 20px 4px rgba(245,158,11,.1)}}
.wallet-glow{animation:pulse-glow 3s ease infinite}
@media(max-width:1023px){.sidebar{transform:translateX(-100%)}.sidebar.open{transform:translateX(0)}.main-area{margin-left:0!important}}
@media (prefers-reduced-motion: reduce){*{animation-duration:0.01ms!important;transition-duration:0.01ms!important}}
</style>

<body>

<!-- Pantalla de Inicio de Sesión -->
<div id="login-screen" class="min-h-screen flex items-center justify-center p-4" style="background:radial-gradient(ellipse at 50% 0%,#1a1500 0%,#0a0a0a 60%)">
  <div class="w-full max-w-md">

      <div class="inline-flex items-center justify-center w-16 h-16 rounded-2xl bg-gradient-to-br from-accent to-accent-d mb-4">

</div>

<!-- Contenedor de la Aplicación -->
<div id="app-shell" class="hidden">
  <!-- Overlay del Sidebar -->
  <div id="sidebar-overlay" class="overlay lg:hidden" onclick="Sidebar.close()"></div>

  <!-- Sidebar -->
  <aside id="sidebar" class="sidebar closed lg:!transform-none">
    <div class="p-6 border-b border-brd">
      <div class="flex items-center gap-3">
        <div class="w-10 h-10 rounded-xl bg-gradient-to-br from-accent to-accent-d flex items-center justify-center">
          <i class="fa-solid fa-wallet text-black text-sm"></i>
        </div>
        <div>
          <h2 class="font-display font-bold text-sm">StockWallet</h2>
          <p class="text-muted text-xs">Control de Negocio</p>
        </div>
      </div>
    </div>
    <nav class="py-4" id="sidebar-nav">
      <div class="nav-item active" data-page="dashboard"><i class="fa-solid fa-chart-line w-5 text-center"></i>Panel Principal</div>
      <div class="nav-item" data-page="inventory"><i class="fa-solid fa-boxes-stacked w-5 text-center"></i>Inventario</div>
      <div class="nav-item" data-page="new-sale"><i class="fa-solid fa-cart-shopping w-5 text-center"></i>Nueva Venta</div>
      <div class="nav-item" data-page="new-expense"><i class="fa-solid fa-receipt w-5 text-center"></i>Nuevo Gasto</div>
      <div class="nav-item" data-page="transactions"><i class="fa-solid fa-clock-rotate-left w-5 text-center"></i>Historial</div>

    </nav>
    <div class="absolute bottom-0 left-0 right-0 p-4 border-t border-brd">
      <div class="bg-bg-alt rounded-xl p-4 mb-3">
        <div class="flex items-center gap-2 mb-1">
          <i class="fa-solid fa-wallet text-accent text-xs"></i>
          <span class="text-xs text-muted font-medium">Saldo de Billetera</span>
        </div>
        <div id="sidebar-wallet" class="font-display font-bold text-lg text-accent">$0.00</div>
      </div>
      <button id="logout-btn" class="nav-item w-full text-danger hover:!bg-red-500/10 hover:!text-red-400">
        <i class="fa-solid fa-right-from-bracket w-5 text-center"></i>Cerrar Sesión
      </button>
    </div>
  </aside>

  <!-- Área Principal -->
  <div id="main-area" class="main-area">
    <!-- Barra Superior -->
    <header class="sticky top-0 z-30 bg-bg/80 backdrop-blur-xl border-b border-brd">
      <div class="flex items-center justify-between px-4 lg:px-8 py-3">
        <div class="flex items-center gap-3">
          <button id="menu-btn" class="lg:hidden w-9 h-9 rounded-lg bg-card border border-brd flex items-center justify-center">
            <i class="fa-solid fa-bars text-sm"></i>

            <span id="topbar-wallet" class="font-display font-bold text-sm text-accent">$0.00</span>
          </div>

<!-- Contenedor de Notificaciones -->
<div id="toast-container" class="toast-container"></div>

<!-- Modal -->

  <div id="modal-box" class="modal-box"></div>

<script>
/* ============================================================
   UTILIDADES
   ============================================================ */
const $ = s => document.querySelector(s);
const $$ = s => document.querySelectorAll(s);
const genId = () => Date.now().toString(36) + Math.random().toString(36).slice(2, 8);
const today = () => new Date().toISOString().split('T')[0];
const now = () => new Date().toISOString();
const fmtCur = n => '$' + Number(n||0).toLocaleString('en-US',{minimumFractionDigits:2,maximumFractionDigits:2});
const fmtDate = d => new Date(d).toLocaleDateString('es-ES',{day:'numeric',month:'short',year:'numeric'});
const fmtDateTime = d => new Date(d).toLocaleString('es-ES',{day:'numeric',month:'short',hour:'2-digit',minute:'2-digit'});
const currentMonth = () => today().slice(0,7);

async function hashPassword(password, salt) {
  const enc = new TextEncoder();
  const data = enc.encode(salt + password + 'SW_SALT_2024');
  const buf = await crypto.subtle.digest('SHA-256', data);
  return Array.from(new Uint8Array(buf)).map(b=>b.toString(16).padStart(2,'0')).join('');
}
function genSalt() { return Array.from(crypto.getRandomValues(new Uint8Array(16))).map(b=>b.toString(16).padStart(2,'0')).join(''); }

/* ============================================================
   BASE DE DATOS (localStorage)
   ============================================================ */
const DB = {
  get(key) { try { return JSON.parse(localStorage.getItem('sw_'+key)) || null; } catch { return null; } },
  set(key, val) { localStorage.setItem('sw_'+key, JSON.stringify(val)); },
  init() {
    if (!this.get('users')) {
      (async()=>{
        const salt = genSalt();
        const hash = await hashPassword('admin123', salt);
        const users = [{id:genId(), username:'admin', salt, passwordHash:hash, createdAt:now()}];
        DB.set('users', users);
      })();
    }
    if (!this.get('products')) {
      this.set('products', [
        {id:genId(),name:'Camiseta Gráfica',sku:'CAM-001',costPrice:8,sellingPrice:22,stock:50,createdAt:now()},
        {id:genId(),name:'Taza Cerámica',sku:'TZA-001',costPrice:3.50,sellingPrice:14,stock:35,createdAt:now()},
        {id:genId(),name:'Poster Arte Impreso',sku:'PST-001',costPrice:2.25,sellingPrice:18,stock:80,createdAt:now()},
        {id:genId(),name:'Paquete de Stickers (5pz)',sku:'STK-001',costPrice:0.80,sellingPrice:6,stock:200,createdAt:now()},
        {id:genId(),name:'Sudadera Bordada',sku:'SUD-001',costPrice:22,sellingPrice:58,stock:25,createdAt:now()},
      ]);
    }
    if (!this.get('sales')) this.set('sales', []);
    if (!this.get('expenses')) this.set('expenses', []);
    if (!this.get('wallet')) this.set('wallet', {balance:0});
  },
  getProducts() { return this.get('products') || []; },
  addProduct(p) { const ps=this.getProducts(); p.id=genId(); p.createdAt=now(); ps.push(p); this.set('products',ps); return p; },
  updateProduct(id, data) { const ps=this.getProducts(); const i=ps.findIndex(p=>p.id===id); if(i>-1){Object.assign(ps[i],data,{id,createdAt:ps[i].createdAt}); this.set('products',ps); return ps[i];} return null; },
  deleteProduct(id) { this.set('products',this.getProducts().filter(p=>p.id!==id)); },
  getSales() { return this.get('sales') || []; },
  addSale(sale) { const ss=this.getSales(); sale.id=genId(); sale.date=now(); ss.push(sale); this.set('sales',ss); return sale; },
  getExpenses() { return this.get('expenses') || []; },
  addExpense(e) { const es=this.getExpenses(); e.id=genId(); e.date=now(); es.push(e); this.set('expenses',es); return e; },
  getWallet() { return this.get('wallet') || {balance:0}; },
  setWallet(b) { this.set('wallet',{balance:b}); },
  creditWallet(amt) { const w=this.getWallet(); w.balance+=amt; this.setWallet(w.balance); return w.balance; },
  debitWallet(amt) { const w=this.getWallet(); w.balance-=amt; this.setWallet(w.balance); return w.balance; },
  getUsers() { return this.get('users') || []; },
  findUser(username) { return this.getUsers().find(u=>u.username===username); },
  updateUser(id, data) { const us=this.getUsers(); const i=us.findIndex(u=>u.id===id); if(i>-1){Object.assign(us[i],data); this.set('users',us);} }
};

/* ============================================================
   AUTENTICACIÓN
   ============================================================ */
const Auth = {
  user: null,
  async login(username, password) {
    const u = DB.findUser(username);
    if (!u) return {ok:false, msg:'Usuario no encontrado'};
    const hash = await hashPassword(password, u.salt);
    if (hash !== u.passwordHash) return {ok:false, msg:'Contraseña incorrecta'};
    this.user = u;
    sessionStorage.setItem('sw_session', u.id);
    return {ok:true};
  },
  logout() { this.user=null; sessionStorage.removeItem('sw_session'); },
  restore() {
    const sid = sessionStorage.getItem('sw_session');
    if (sid) { const us=DB.getUsers(); this.user=us.find(u=>u.id===sid)||null; }
  }
};

/* ============================================================
   NOTIFICACIONES (TOAST)
   ============================================================ */
const Toast = {
  show(msg, type='info') {
    const icons = {success:'fa-check-circle',error:'fa-circle-xmark',info:'fa-circle-info',warn:'fa-triangle-exclamation'};
    const el = document.createElement('div');
    el.className = `toast toast-${type}`;
    el.innerHTML = `<i class="fa-solid ${icons[type]||icons.info}"></i><span>${msg}</span>`;
    $('#toast-container').appendChild(el);
    setTimeout(()=>{el.style.animation='slideOut .3s ease forwards';setTimeout(()=>el.remove(),300);},3000);
  }
};

/* ============================================================
   MODAL
   ============================================================ */
const Modal = {
  show(html) { $('#modal-box').innerHTML=html; $('#modal-backdrop').classList.add('show'); },
  close() { $('#modal-backdrop').classList.remove('show'); },
  confirm(msg, onConfirm) {
    this.show(`<h3 class="font-display font-bold text-lg mb-3">Confirmar Acción</h3><p class="text-muted text-sm mb-6">${msg}</p>
      <div class="flex gap-3 justify-end"><button class="btn btn-ghost" onclick="Modal.close()">Cancelar</button>
      <button class="btn btn-danger" id="modal-confirm-btn">Confirmar</button></div>`);
    $('#modal-confirm-btn').onclick = ()=>{ onConfirm(); Modal.close(); };
  }
};
 $('#modal-backdrop').addEventListener('click',e=>{if(e.target===$('#modal-backdrop'))Modal.close();});

/* ============================================================
   SIDEBAR
   ============================================================ */
const Sidebar = {
  open() { $('#sidebar').classList.add('open'); $('#sidebar-overlay').classList.add('show'); },
  close() { $('#sidebar').classList.remove('open'); $('#sidebar-overlay').classList.remove('show'); },
  toggle() { $('#sidebar').classList.contains('open') ? this.close() : this.open(); },
  setActive(page) {
    $$('#sidebar-nav .nav-item').forEach(n=>{n.classList.toggle('active',n.dataset.page===page);});
  }
};
 $('#menu-btn').addEventListener('click',()=>Sidebar.toggle());

function updateWalletDisplay() {
  const b = fmtCur(DB.getWallet().balance);
  $('#sidebar-wallet').textContent = b;
  $('#topbar-wallet').textContent = b;
}

/* ============================================================
   ENRUTADOR
   ============================================================ */
let currentPage = 'dashboard';
const pageTitles = {dashboard:'Panel Principal',inventory:'Inventario','new-sale':'Nueva Venta','new-expense':'Nuevo Gasto',transactions:'Historial',analytics:'Análisis',settings:'Configuración'};

function navigate(page) {
  currentPage = page;
  $('#page-title').textContent = pageTitles[page]||page;
  Sidebar.setActive(page);
  Sidebar.close();
  updateWalletDisplay();
  const renderers = {dashboard:renderDashboard,inventory:renderInventory,'new-sale':renderNewSale,'new-expense':renderNewExpense,transactions:renderTransactions,analytics:renderAnalytics,settings:renderSettings};
  if (renderers[page]) renderers[page]();
}

 $$('#sidebar-nav .nav-item').forEach(n=>{
  n.addEventListener('click',()=>navigate(n.dataset.page));
});
 $('#logout-btn').addEventListener('click',()=>{Auth.logout();showLogin();});

/* ============================================================
   INICIO DE SESIÓN
   ============================================================ */
function showLogin() {
  $('#login-screen').classList.remove('hidden');
  $('#app-shell').classList.add('hidden');
  $('#login-user').value='';$('#login-pass').value='';$('#login-error').classList.add('hidden');
}
function showApp() {
  $('#login-screen').classList.add('hidden');
  $('#app-shell').classList.remove('hidden');
  navigate('dashboard');
}

 $('#login-btn').addEventListener('click',async()=>{
  const u=$('#login-user').value.trim(), p=$('#login-pass').value;
  if(!u||!p){$('#login-error').textContent='Por favor complete todos los campos';$('#login-error').classList.remove('hidden');return;}
  const res = await Auth.login(u,p);
  if(res.ok){showApp();}else{$('#login-error').textContent=res.msg;$('#login-error').classList.remove('hidden');}
});
 $('#login-pass').addEventListener('keydown',e=>{if(e.key==='Enter')$('#login-btn').click();});
 $('#login-user').addEventListener('keydown',e=>{if(e.key==='Enter')$('#login-pass').focus();});

/* ============================================================
   PANEL PRINCIPAL
   ============================================================ */
let dashboardCharts = {};
function destroyDashboardCharts() { Object.values(dashboardCharts).forEach(c=>{if(c)c.destroy();}); dashboardCharts={}; }

function renderDashboard() {
  destroyDashboardCharts();
  const sales = DB.getSales(), expenses = DB.getExpenses(), products = DB.getProducts();
  const td = today(), cm = currentMonth();

  const todaySales = sales.filter(s=>s.date.startsWith(td));
  const dailySales = todaySales.reduce((a,s)=>a+s.total,0);
  const dailyCost = todaySales.reduce((a,s)=>a+s.totalCost,0);
  const dailyProfit = dailySales - dailyCost;
  const monthlySales = sales.filter(s=>s.date.startsWith(cm)).reduce((a,s)=>a+s.total,0);
  const dailyExpenses = expenses.filter(e=>e.date.startsWith(td)).reduce((a,e)=>a+e.amount,0);
  const wallet = DB.getWallet().balance;
  const lowStock = products.filter(p=>p.stock<10);

  /* Últimos 7 días */
  const last7 = [];
  for(let i=6;i>=0;i--){
    const d = new Date(); d.setDate(d.getDate()-i);
    const ds = d.toISOString().split('T')[0];
    const label = d.toLocaleDateString('es-ES',{weekday:'short'});
    const daySales = sales.filter(s=>s.date.startsWith(ds)).reduce((a,s)=>a+s.total,0);
    const dayExp = expenses.filter(e=>e.date.startsWith(ds)).reduce((a,e)=>a+e.amount,0);
    last7.push({label,sales:daySales,expenses:dayExp});
  }

  /* Transacciones recientes */
  const allTx = [

          <div class="flex items-center gap-2 mb-1">
            <h4 class="font-display font-bold text-sm truncate">${p.name}</h4>
            ${p.stock<10?'<span class="badge badge-danger shrink-0">Stock Bajo</span>':''}
          </div>
          <div class="text-muted text-xs">SKU: ${p.sku||'N/A'}</div>
        </div>
        <div class="flex flex-wrap gap-4 sm:gap-6 text-sm">
          <div><span class="text-muted text-xs block">Costo</span><span class="font-medium">${fmtCur(p.costPrice)}</span></div>
          <div><span class="text-muted text-xs block">Venta</span><span class="font-medium text-success">${fmtCur(p.sellingPrice)}</span></div>
          <div><span class="text-muted text-xs block">Margen</span><span class="font-medium text-accent">${Math.round((p.sellingPrice-p.costPrice)/p.sellingPrice*100)}%</span></div>
          <div><span class="text-muted text-xs block">Stock</span><span class="font-bold ${p.stock<10?'text-danger':'text-fg'}">${p.stock}</span></div>
        </div>
        <div class="flex gap-2">
          <button class="btn btn-ghost btn-sm" onclick="showProductModal('${p.id}')"><i class="fa-solid fa-pen text-xs"></i></button>
          <button class="btn btn-ghost btn-sm text-danger hover:!border-danger/50" onclick="deleteProduct('${p.id}','${p.name.replace(/'/g,"\\'")}')"><i class="fa-solid fa-trash text-xs"></i></button>

function filterInventory() {
  const q = $('#inv-search').value.toLowerCase();
  const filtered = DB.getProducts().filter(p=>p.name.toLowerCase().includes(q)||(p.sku||'').toLowerCase().includes(q));
  $('#inv-list').innerHTML = renderProductList(filtered);
}

function showProductModal(id=null) {
  const p = id ? DB.getProducts().find(x=>x.id===id) : null;
  const title = p ? 'Editar Producto' : 'Agregar Producto';
  Modal.show(`
    <h3 class="font-display font-bold text-lg mb-5">${title}</h3>
    <div class="space-y-4">
      <div><label class="block text-xs font-medium text-muted mb-1.5 uppercase tracking-wider">Nombre del Producto</label>
        <input id="pm-name" type="text" class="input-field" placeholder="Ej. Camiseta Gráfica" value="${p?p.name:''}"></div>
      <div><label class="block text-xs font-medium text-muted mb-1.5 uppercase tracking-wider">SKU (opcional)</label>
        <input id="pm-sku" type="text" class="input-field" placeholder="Ej. CAM-001" value="${p?p.sku||'':''}"></div>
      <div class="grid grid-cols-2 gap-4">
        <div><label class="block text-xs font-medium text-muted mb-1.5 uppercase tracking-wider">Precio de Costo</label>
          <input id="pm-cost" type="number" step="0.01" min="0" class="input-field" placeholder="0.00" value="${p?p.costPrice:''}"></div>
        <div><label class="block text-xs font-medium text-muted mb-1.5 uppercase tracking-wider">Precio de Venta</label>
          <input id="pm-sell" type="number" step="0.01" min="0" class="input-field" placeholder="0.00" value="${p?p.sellingPrice:''}"></div>
      </div>
      <div><label class="block text-xs font-medium text-muted mb-1.5 uppercase tracking-wider">Cantidad en Stock</label>
        <input id="pm-stock" type="number" min="0" class="input-field" placeholder="0" value="${p?p.stock:''}"></div>
      <div id="pm-error" class="text-danger text-xs hidden"></div>
      <div class="flex gap-3 justify-end pt-2">
        <button class="btn btn-ghost" onclick="Modal.close()">Cancelar</button>
        <button class="btn btn-primary" onclick="saveProduct('${id||''}')">${p?'Actualizar':'Agregar'} Producto</button>
      </div>
    </div>
  `);
}

function saveProduct(id) {
  const name=$('#pm-name').value.trim(), sku=$('#pm-sku').value.trim(),
        cost=parseFloat($('#pm-cost').value), sell=parseFloat($('#pm-sell').value),
        stock=parseInt($('#pm-stock').value);
  if(!name){$('#pm-error').textContent='El nombre del producto es obligatorio';$('#pm-error').classList.remove('hidden');return;}
  if(isNaN(cost)||cost<0){$('#pm-error').textContent='Se requiere un precio de costo válido';$('#pm-error').classList.remove('hidden');return;}
  if(isNaN(sell)||sell<0){$('#pm-error').textContent='Se requiere un precio de venta válido';$('#pm-error').classList.remove('hidden');return;}
  if(isNaN(stock)||stock<0){$('#pm-error').textContent='Se requiere una cantidad de stock válida';$('#pm-error').classList.remove('hidden');return;}
  if(id){DB.updateProduct(id,{name,sku,costPrice:cost,sellingPrice:sell,stock});Toast.show('Producto actualizado','success');}
  else{DB.addProduct({name,sku,costPrice:cost,sellingPrice:sell,stock});Toast.show('Producto agregado','success');}
  Modal.close(); renderInventory();
}

function deleteProduct(id,name) {
  Modal.confirm(`¿Eliminar "${name}" del inventario? Esta acción no se puede deshacer.`,()=>{
    DB.deleteProduct(id); Toast.show('Producto eliminado','success'); renderInventory();
  });
}

let saleCart = [];

function renderNewSale() {
  saleCart = [];
  const products = DB.getProducts();
  $('#content').innerHTML = `
    <div class="flex flex-col sm:flex-row items-start sm:items-center justify-between gap-4 mb-6">
      <div>

          <div id="sale-cart" class="space-y-2 mb-4 min-h-[80px]">
            <p class="text-muted text-sm text-center py-6">El carrito está vacío</p>
          </div>
          <div class="border-t border-brd pt-4 space-y-2">
            <div class="flex justify-between text-sm"><span class="text-muted">Total de Venta</span><span id="sale-total" class="font-bold text-success">$0.00</span></div>
            <div class="flex justify-between text-sm"><span class="text-muted">Costo de Productos</span><span id="sale-cost" class="font-medium">$0.00</span></div>
            <div class="flex justify-between text-sm"><span class="text-muted">Ganancia</span><span id="sale-profit" class="font-bold text-accent">$0.00</span></div>
          </div>
          <button id="sale-complete-btn" class="btn btn-success w-full justify-center mt-4 opacity-50 pointer-events-none" onclick="completeSale()">
            <i class="fa-solid fa-check"></i>Completar Venta
          </button>
        </div>
      </div>
    </div>
  `;
}

function renderSaleProducts(products) {
  if(products.length===0) return '<p class="text-muted text-sm text-center py-8">No hay productos disponibles</p>';
  return products.filter(p=>p.stock>0).map(p=>`
    <div class="bg-card border border-brd rounded-xl p-4 flex items-center gap-4 hover:border-accent/20 transition-colors sale-product" data-name="${p.name.toLowerCase()}">
      <div class="flex-1 min-w-0">
        <div class="font-medium text-sm truncate">${p.name}</div>
        <div class="text-muted text-xs">Venta: ${fmtCur(p.sellingPrice)} &middot; Stock: ${p.stock}</div>
      </div>
      <div class="flex items-center gap-2">
        <input type="number" min="1" max="${p.stock}" value="1" class="input-field w-16 text-center text-sm py-1.5 sale-qty" data-id="${p.id}">
        <button class="btn btn-primary btn-sm" onclick="addToCart('${p.id}')"><i class="fa-solid fa-plus text-xs"></i></button>
      </div>
    </div>
  `).join('') || '<p class="text-muted text-sm text-center py-8">Todos los productos agotados</p>';
}

function filterSaleProducts() {
  const q=$('#sale-search').value.toLowerCase();
  const filtered=DB.getProducts().filter(p=>p.name.toLowerCase().includes(q));
  $('#sale-products').innerHTML=renderSaleProducts(filtered);
}

function addToCart(productId) {
  const p=DB.getProducts().find(x=>x.id===productId);
  if(!p)return;
  const qtyEl=document.querySelector(`.sale-qty[data-id="${productId}"]`);
  const qty=parseInt(qtyEl?qtyEl.value:1)||1;
  if(qty>p.stock){Toast.show(`Solo hay ${p.stock} en stock`,'warn');return;}
  const existing=saleCart.find(c=>c.productId===productId);
  if(existing){
    if(existing.qty+qty>p.stock){Toast.show(`Solo quedan ${p.stock-existing.qty} disponibles más`,'warn');return;}
    existing.qty+=qty;
  } else {
    saleCart.push({productId:p.id,name:p.name,costPrice:p.costPrice,sellingPrice:p.sellingPrice,qty});
  }
  updateCartUI();
  Toast.show(`Agregado ${qty}x ${p.name}`,'success');
}

function updateCartUI() {
  if(saleCart.length===0){
    $('#sale-cart').innerHTML='<p class="text-muted text-sm text-center py-6">El carrito está vacío</p>';
    $('#sale-total').textContent='$0.00';$('#sale-cost').textContent='$0.00';$('#sale-profit').textContent='$0.00';
    $('#sale-complete-btn').classList.add('opacity-50','pointer-events-none');
    return;
  }
  $('#sale-complete-btn').classList.remove('opacity-50','pointer-events-none');
  let total=0,cost=0;
  $('#sale-cart').innerHTML=saleCart.map((item,i)=>{
    const sub=item.sellingPrice*item.qty;
    const c=item.costPrice*item.qty;
    total+=sub;cost+=c;
    return `<div class="flex items-center justify-between py-2 border-b border-brd/50 last:border-0">
      <div class="min-w-0 flex-1">
        <div class="text-sm font-medium truncate">${item.name}</div>
        <div class="text-muted text-xs">${item.qty} x ${fmtCur(item.sellingPrice)}</div>
      </div>
      <div class="flex items-center gap-2">
        <span class="text-sm font-medium">${fmtCur(sub)}</span>
        <button class="text-muted hover:text-danger text-xs" onclick="removeFromCart(${i})"><i class="fa-solid fa-xmark"></i></button>
      </div>
    </div>`;
  }).join('');
  $('#sale-total').textContent=fmtCur(total);
  $('#sale-cost').textContent=fmtCur(cost);
  $('#sale-profit').textContent=fmtCur(total-cost);
}

function removeFromCart(i) { saleCart.splice(i,1); updateCartUI(); }

function completeSale() {
  if(saleCart.length===0)return;
  const total=saleCart.reduce((a,i)=>a+i.sellingPrice*i.qty,0);
  const totalCost=saleCart.reduce((a,i)=>a+i.costPrice*i.qty,0);
  saleCart.forEach(item=>{
    const p=DB.getProducts().find(x=>x.id===item.productId);
    if(p){p.stock-=item.qty;DB.updateProduct(p.id,{stock:p.stock});}
  });
  DB.addSale({items:[...saleCart],total,totalCost});
  DB.creditWallet(total);
  updateWalletDisplay();
  Toast.show(`Venta completada: ${fmtCur(total)} acreditado a la billetera`,'success');
  renderNewSale();
}

            <div class="text-xs text-muted">Saldo Actual de Billetera</div>
            <div class="font-display font-bold">${fmtCur(DB.getWallet().balance)}</div>
          </div>
        </div>
        <button class="btn btn-danger w-full justify-center py-3" onclick="recordExpense()">
          <i class="fa-solid fa-minus"></i>Registrar Gasto
        </button>
      </div>
    </div>
  `;
}

function recordExpense() {
  const category=$('#exp-cat').value, desc=$('#exp-desc').value.trim(),
        amount=parseFloat($('#exp-amount').value);
  if(!desc){$('#exp-error').textContent='La descripción es obligatoria';$('#exp-error').classList.remove('hidden');return;}
  if(isNaN(amount)||amount<=0){$('#exp-error').textContent='Se requiere un monto válido';$('#exp-error').classList.remove('hidden');return;}
  const balance=DB.getWallet().balance;
  if(amount>balance){Toast.show(`Advertencia: El gasto excede el saldo de la billetera en ${fmtCur(amount-balance)}`,'warn');}
  DB.addExpense({category,description:desc,amount});
  DB.debitWallet(amount);
  updateWalletDisplay();
  Toast.show(`Gasto de ${fmtCur(amount)} registrado`,'success');
  renderNewExpense();
}

/* ============================================================
   HISTORIAL DE TRANSACCIONES
   ============================================================ */
function renderTransactions() {
  const sales=DB.getSales(), expenses=DB.getExpenses();
  const allTx=[
    ...sales.map(s=>({type:'sale',id:s.id,date:s.date,desc:`Venta #${s.id.slice(-5).toUpperCase()}`,amount:s.total,profit:s.total-s.totalCost,detail:s.items})),
    ...expenses.map(e=>({type:'expense',id:e.id,date:e.date,desc:e.description,category:e.category,amount:e.amount}))
  ].sort((a,b)=>new Date(b.date)-new Date(a.date));

  $('#content').innerHTML = `
    <div class="flex flex-col sm:flex-row items-start sm:items-center justify-between gap-4 mb-6">
      <div>
        <h2 class="font-display font-bold text-xl">Historial de Transacciones</h2>
        <p class="text-muted text-sm">${allTx.length} transacciones en total</p>
      </div>
      <div class="flex gap-2">
        <select id="tx-filter" class="input-field w-auto text-sm" onchange="filterTransactions()">
          <option value="all">Todos los Tipos</option>
          <option value="sale">Solo Ventas</option>
          <option value="expense">Solo Gastos</option>
        </select>
      </div>
    </div>
    <div id="tx-list" class="space-y-2">
      ${renderTxList(allTx)}
    </div>
  `;
}

function renderTxList(txs) {
  if(txs.length===0) return '<div class="text-center py-16"><i class="fa-solid fa-receipt text-4xl text-muted mb-4 block"></i><p class="text-muted">No se encontraron transacciones</p></div>';
  return txs.map(tx=>`
    <div class="bg-card border border-brd rounded-xl p-4 flex items-center gap-4 cursor-pointer hover:border-accent/20 transition-colors tx-item" data-type="${tx.type}" onclick="showTxDetail('${tx.id}','${tx.type}')">
      <div class="w-10 h-10 rounded-xl flex items-center justify-center shrink-0 ${tx.type==='sale'?'bg-success/10':'bg-danger/10'}">
        <i class="fa-solid ${tx.type==='sale'?'fa-arrow-up text-success':'fa-arrow-down text-danger'}"></i>
      </div>
      <div class="flex-1 min-w-0">
        <div class="flex items-center gap-2 flex-wrap">
          <span class="font-medium text-sm truncate">${tx.desc}</span>
          ${tx.category?`<span class="badge badge-warn">${tx.category}</span>`:''}
        </div>
        <div class="text-muted text-xs">${fmtDateTime(tx.date)}</div>
      </div>
      <div class="text-right shrink-0">
        <div class="font-display font-bold ${tx.type==='sale'?'text-success':'text-danger'}">${tx.type==='sale'?'+':'−'}${fmtCur(tx.amount)}</div>
        ${tx.type==='sale'?`<div class="text-muted text-xs">Ganancia: ${fmtCur(tx.profit)}</div>`:''}
      </div>
    </div>
  `).join('');
}

function filterTransactions() {
  const filter=$('#tx-filter').value;
  const sales=DB.getSales(), expenses=DB.getExpenses();
  let allTx=[
    ...sales.map(s=>({type:'sale',id:s.id,date:s.date,desc:`Venta #${s.id.slice(-5).toUpperCase()}`,amount:s.total,profit:s.total-s.totalCost,detail:s.items})),
    ...expenses.map(e=>({type:'expense',id:e.id,date:e.date,desc:e.description,category:e.category,amount:e.amount}))
  ].sort((a,b)=>new Date(b.date)-new Date(a.date));
  if(filter!=='all') allTx=allTx.filter(t=>t.type===filter);
  $('#tx-list').innerHTML=renderTxList(allTx);
}

function showTxDetail(id,type) {
  if(type==='sale'){
    const s=DB.getSales().find(x=>x.id===id);
    if(!s)return;
    Modal.show(`
      <h3 class="font-display font-bold text-lg mb-1">Detalle de Venta</h3>
      <p class="text-muted text-xs mb-4">${fmtDateTime(s.date)}</p>
      <div class="space-y-2 mb-4">
        ${s.items.map(item=>`
          <div class="flex justify-between py-2 border-b border-brd/50 text-sm">
            <div><span class="font-medium">${item.name}</span> <span class="text-muted">x${item.qty}</span></div>
            <span class="font-medium">${fmtCur(item.sellingPrice*item.qty)}</span>
          </div>
        `).join('')}
      </div>
      <div class="bg-bg-alt rounded-xl p-4 space-y-1">
        <div class="flex justify-between text-sm"><span class="text-muted">Total de Venta</span><span class="font-bold text-success">${fmtCur(s.total)}</span></div>
        <div class="flex justify-between text-sm"><span class="text-muted">Costo de Productos</span><span>${fmtCur(s.totalCost)}</span></div>
        <div class="flex justify-between text-sm"><span class="text-muted">Ganancia</span><span class="font-bold text-accent">${fmtCur(s.total-s.totalCost)}</span></div>
      </div>
      <div class="flex justify-end mt-4"><button class="btn btn-ghost" onclick="Modal.close()">Cerrar</button></div>
    `);
  } else {
    const e=DB.getExpenses().find(x=>x.id===id);
    if(!e)return;
    Modal.show(`
      <h3 class="font-display font-bold text-lg mb-1">Detalle de Gasto</h3>
      <p class="text-muted text-xs mb-4">${fmtDateTime(e.date)}</p>
      <div class="bg-bg-alt rounded-xl p-4 space-y-1">
        <div class="flex justify-between text-sm"><span class="text-muted">Categoría</span><span class="badge badge-warn">${e.category}</span></div>
        <div class="flex justify-between text-sm"><span class="text-muted">Descripción</span><span class="font-medium">${e.description}</span></div>
        <div class="flex justify-between text-sm"><span class="text-muted">Monto</span><span class="font-bold text-danger">${fmtCur(e.amount)}</span></div>

/* ============================================================
   ANÁLISIS
   ============================================================ */
let analyticsCharts = {};
function destroyAnalyticsCharts() { Object.values(analyticsCharts).forEach(c=>{if(c)c.destroy();}); analyticsCharts={}; }

function renderAnalytics() {
  destroyAnalyticsCharts();
  const sales=DB.getSales(), expenses=DB.getExpenses(), products=DB.getProducts();
  const cm=currentMonth();

  /* Últimos 30 días */
  const last30=[];
  for(let i=29;i>=0;i--){
    const d=new Date();d.setDate(d.getDate()-i);
    const ds=d.toISOString().split('T')[0];
    const label=d.toLocaleDateString('es-ES',{day:'numeric',month:'short'});
    const daySales=sales.filter(s=>s.date.startsWith(ds)).reduce((a,s)=>a+s.total,0);
    const dayProfit=sales.filter(s=>s.date.startsWith(ds)).reduce((a,s)=>a+(s.total-s.totalCost),0);
    const dayExp=expenses.filter(e=>e.date.startsWith(ds)).reduce((a,e)=>a+e.amount,0);
    last30.push({label,sales:daySales,profit:dayProfit,expenses:dayExp});
  }

  /* Gastos por categoría */
  const catMap={};
  expenses.forEach(e=>{catMap[e.category]=(catMap[e.category]||0)+e.amount;});
  const catLabels=Object.keys(catMap);
  const catValues=Object.values(catMap);
  const catColors=['#f59e0b','#ef4444','#10b981','#3b82f6','#8b5cf6','#ec4899','#06b6d4','#f97316','#6366f1'];

  /* Productos más vendidos */
  const prodRev={};
  sales.forEach(s=>s.items.forEach(item=>{
    if(!prodRev[item.productId])prodRev[item.productId]={name:item.name,revenue:0,qty:0};
    prodRev[item.productId].revenue+=item.sellingPrice*item.qty;
    prodRev[item.productId].qty+=item.qty;
  }));
  const topProducts=Object.values(prodRev).sort((a,b)=>b.revenue-a.revenue).slice(0,6);

  /* Comparación mensual */
  const thisMonthSales=sales.filter(s=>s.date.startsWith(cm)).reduce((a,s)=>a+s.total,0);
  const thisMonthProfit=sales.filter(s=>s.date.startsWith(cm)).reduce((a,s)=>a+(s.total-s.totalCost),0);
  const thisMonthExp=expenses.filter(e=>e.date.startsWith(cm)).reduce((a,e)=>a+e.amount,0);
  const lastMonth=cm.split('-');lastMonth[1]=String(Math.max(1,parseInt(lastMonth[1])-1)).padStart(2,'0');
  const lm=lastMonth.join('-');
  const lastMonthSales=sales.filter(s=>s.date.startsWith(lm)).reduce((a,s)=>a+s.total,0);
  const lastMonthProfit=sales.filter(s=>s.date.startsWith(lm)).reduce((a,s)=>a+(s.total-s.totalCost),0);
  const lastMonthExp=expenses.filter(e=>e.date.startsWith(lm)).reduce((a,e)=>a+e.amount,0);

  const chartFont={family:"'DM Sans',sans-serif"};

  $('#content').innerHTML = `
    <div class="mb-6">
      <h2 class="font-display font-bold text-xl">Análisis</h2>
      <p class="text-muted text-sm">Perspectivas sobre el rendimiento de su negocio</p>
    </div>

    <!-- Tarjetas de comparación mensual -->
    <div class="grid grid-cols-1 sm:grid-cols-3 gap-4 mb-8">
      <div class="stat-card fade-up fade-up-1" style="--card-accent:#10b981">
        <div class="text-muted text-xs font-medium uppercase tracking-wider mb-2">Ventas del Mes</div>
        <div class="font-display font-bold text-2xl text-success">${fmtCur(thisMonthSales)}</div>
        <div class="text-xs mt-1 ${lastMonthSales>0?(thisMonthSales>=lastMonthSales?'text-success':'text-danger'):'text-muted'}">
          ${lastMonthSales>0?`${thisMonthSales>=lastMonthSales?'+':''}${Math.round((thisMonthSales-lastMonthSales)/lastMonthSales*100)}% vs mes anterior`:'Sin datos del mes anterior'}
        </div>
      </div>
      <div class="stat-card fade-up fade-up-2" style="--card-accent:#ef4444">
        <div class="text-muted text-xs font-medium uppercase tracking-wider mb-2">Gastos del Mes</div>
        <div class="font-display font-bold text-2xl text-danger">${fmtCur(thisMonthExp)}</div>
        <div class="text-xs mt-1 ${lastMonthExp>0?(thisMonthExp<=lastMonthExp?'text-success':'text-danger'):'text-muted'}">
          ${lastMonthExp>0?`${thisMonthExp<=lastMonthExp?'−':'+'}${Math.round(Math.abs(thisMonthExp-lastMonthExp)/lastMonthExp*100)}% vs mes anterior`:'Sin datos del mes anterior'}
        </div>
      </div>
      <div class="stat-card fade-up fade-up-3" style="--card-accent:#8b5cf6">
        <div class="text-muted text-xs font-medium uppercase tracking-wider mb-2">Ganancia del Mes</div>
        <div class="font-display font-bold text-2xl text-purple-400">${fmtCur(thisMonthProfit)}</div>
        <div class="text-xs mt-1 ${lastMonthProfit>0?(thisMonthProfit>=lastMonthProfit?'text-success':'text-danger'):'text-muted'}">
          ${lastMonthProfit>0?`${thisMonthProfit>=lastMonthProfit?'+':''}${Math.round((thisMonthProfit-lastMonthProfit)/lastMonthProfit*100)}% vs mes anterior`:'Sin datos del mes anterior'}
        </div>
      </div>
    </div>

    <!-- Gráficas fila 1 -->
    <div class="grid grid-cols-1 xl:grid-cols-2 gap-4 mb-6">
      <div class="stat-card fade-up fade-up-3" style="--card-accent:#10b981">
        <h3 class="font-display font-bold text-sm mb-4">Tendencia de Ventas y Ganancias (30 Días)</h3>
        <div style="height:280px"><canvas id="chart-trend"></canvas></div>
      </div>
      <div class="stat-card fade-up fade-up-4" style="--card-accent:#f59e0b">
        <h3 class="font-display font-bold text-sm mb-4">Desglose de Gastos por Categoría</h3>
        <div style="height:280px;display:flex;align-items:center;justify-content:center">
          ${catLabels.length===0?'<p class="text-muted text-sm">Sin datos de gastos</p>':'<canvas id="chart-categories"></canvas>'}
        </div>
      </div>
    </div>

    <!-- Gráficas fila 2 -->
    <div class="grid grid-cols-1 xl:grid-cols-2 gap-4">
      <div class="stat-card fade-up fade-up-4" style="--card-accent:#3b82f6">
        <h3 class="font-display font-bold text-sm mb-4">Productos Más Vendidos por Ingresos</h3>
        <div style="height:280px;display:flex;align-items:center;justify-content:center">
          ${topProducts.length===0?'<p class="text-muted text-sm">Sin datos de ventas</p>':'<canvas id="chart-products"></canvas>'}
        </div>
      </div>
      <div class="stat-card fade-up fade-up-5" style="--card-accent:#06b6d4">
        <h3 class="font-display font-bold text-sm mb-4">Balance Diario Neto (Ventas - Gastos)</h3>
        <div style="height:280px"><canvas id="chart-net"></canvas></div>
      </div>
    </div>
  `;

  /* Gráfica: Tendencia */
  const ctxTrend=document.getElementById('chart-trend');
  if(ctxTrend){
    analyticsCharts['trend']=new Chart(ctxTrend,{
      type:'line',
      data:{
        labels:last30.map(d=>d.label),
        datasets:[
          {label:'Ventas',data:last30.map(d=>d.sales),borderColor:'#10b981',backgroundColor:'rgba(16,185,129,0.08)',fill:true,tension:.4,pointRadius:0,borderWidth:2},
          {label:'Ganancia',data:last30.map(d=>d.profit),borderColor:'#8b5cf6',backgroundColor:'rgba(139,92,246,0.08)',fill:true,tension:.4,pointRadius:0,borderWidth:2}
        ]
      },
      options:{responsive:true,maintainAspectRatio:false,interaction:{mode:'index',intersect:false},
        plugins:{legend:{position:'bottom',labels:{color:'#737373',padding:16,usePointStyle:true,pointStyleWidth:8,font:{size:11,...chartFont}}}},
        scales:{x:{grid:{display:false},ticks:{color:'#525252',font:{size:10},maxTicksLimit:8}},y:{grid:{color:'#1a1a1a'},ticks:{color:'#525252',font:{size:10},callback:v=>'$'+v},beginAtZero:true}}
      }
    });
  }

  /* Gráfica: Categorías de Gastos */
  const ctxCat=document.getElementById('chart-categories');
  if(ctxCat&&catLabels.length>0){
    analyticsCharts['categories']=new Chart(ctxCat,{
      type:'doughnut',
      data:{labels:catLabels,datasets:[{data:catValues,backgroundColor:catColors.slice(0,catLabels.length),borderWidth:0,hoverOffset:8}]},
      options:{responsive:true,maintainAspectRatio:false,cutout:'65%',
        plugins:{legend:{position:'right',labels:{color:'#a3a3a3',padding:10,usePointStyle:true,pointStyleWidth:8,font:{size:11,...chartFont}}}}
      }
    });
  }

  /* Gráfica: Productos Top */
  const ctxProd=document.getElementById('chart-products');
  if(ctxProd&&topProducts.length>0){
    analyticsCharts['products']=new Chart(ctxProd,{
      type:'bar',
      data:{labels:topProducts.map(p=>p.name),datasets:[{label:'Ingresos',data:topProducts.map(p=>p.revenue),backgroundColor:'rgba(59,130,246,0.7)',borderRadius:6,borderSkipped:false}]},
      options:{indexAxis:'y',responsive:true,maintainAspectRatio:false,
        plugins:{legend:{display:false}},
        scales:{x:{grid:{color:'#1a1a1a'},ticks:{color:'#525252',font:{size:10},callback:v=>'$'+v}},y:{grid:{display:false},ticks:{color:'#a3a3a3',font:{size:11,...chartFont}}}}
      }
    });
  }

  /* Gráfica: Balance Neto Diario */
  const ctxNet=document.getElementById('chart-net');
  if(ctxNet){
    analyticsCharts['net']=new Chart(ctxNet,{
      type:'bar',
      data:{labels:last30.map(d=>d.label),datasets:[{label:'Neto',data:last30.map(d=>d.sales-d.expenses),backgroundColor:last30.map(d=>(d.sales-d.expenses)>=0?'rgba(6,182,212,0.7)':'rgba(239,68,68,0.7)'),borderRadius:4,borderSkipped:false}]},
      options:{responsive:true,maintainAspectRatio:false,
        plugins:{legend:{display:false}},
        scales:{x:{grid:{display:false},ticks:{color:'#525252',font:{size:10},maxTicksLimit:8}},y:{grid:{color:'#1a1a1a'},ticks:{color:'#525252',font:{size:10},callback:v=>'$'+v}}}
      }
    });
  }
}

          <div class="flex justify-between py-2 border-b border-brd/50"><span class="text-muted text-sm">Usuario</span><span class="text-sm font-medium">${Auth.user.username}</span></div>

async function changePassword() {
  const cur=$('#set-cur-pass').value, nw=$('#set-new-pass').value, conf=$('#set-conf-pass').value;
  if(!cur||!nw||!conf){$('#set-error').textContent='Todos los campos son obligatorios';$('#set-error').classList.remove('hidden');return;}
  if(nw.length<6){$('#set-error').textContent='La nueva contraseña debe tener al menos 6 caracteres';$('#set-error').classList.remove('hidden');return;}
  if(nw!==conf){$('#set-error').textContent='Las contraseñas nuevas no coinciden';$('#set-error').classList.remove('hidden');return;}
  const hash=await hashPassword(cur,Auth.user.salt);
  if(hash!==Auth.user.passwordHash){$('#set-error').textContent='La contraseña actual es incorrecta';$('#set-error').classList.remove('hidden');return;}
  const newSalt=genSalt(), newHash=await hashPassword(nw,newSalt);
  DB.updateUser(Auth.user.id,{salt:newSalt,passwordHash:newHash});
  Auth.user.salt=newSalt;Auth.user.passwordHash=newHash;
  Toast.show('Contraseña actualizada correctamente','success');
  $('#set-cur-pass').value='';$('#set-new-pass').value='';$('#set-conf-pass').value='';$('#set-error').classList.add('hidden');
}

function clearAllData() {
  Modal.confirm('Esto eliminará permanentemente TODOS los productos, ventas, gastos y datos de la billetera. Su cuenta se mantendrá. ¿Está seguro?',()=>{
    ['products','sales','expenses','wallet'].forEach(k=>localStorage.removeItem('sw_'+k));
    DB.init();
    Toast.show('Todos los datos han sido borrados','success');
    navigate('dashboard');
  });
}

   INICIALIZACIÓN
   ============================================================ */

  DB.init();
  setTimeout(()=>{
    Auth.restore();
    if(Auth.user){showApp();}else{showLogin();}
  }, 100);
}

init();
